<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Simulador de Fazenda</title>
  <link rel="stylesheet" href="simulador.css">
</head>
<body>

  <div class="viewport">
    <div class="world" id="world">
      <img src="/assets/imagens/geral/mapa.png" alt="Mapa da fazenda">
    </div>
  </div>

  <script>
    let x = 0;
    let y = 0;
    const speed = 30;

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") x -= speed;
      if (e.key === "ArrowLeft") x += speed;
      if (e.key === "ArrowUp") y += speed;
      if (e.key === "ArrowDown") y -= speed;

      document.getElementById("world").style.transform =
        `translate(${x}px, ${y}px)`;
    });
  </script>

</body>
</html>
