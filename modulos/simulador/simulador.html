<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Simulador</title>
  <link rel="stylesheet" href="simulador.css">
</head>
<body>

<div class="viewport">
    
  <div class="world">
    <img src="/assets/imagens/simulador/mapa.png" class="mapa">

    <!-- OBJETOS -->
    <img src="/assets/imagens/simulador/galpao.png" class="objeto galpao">

    <img src="/assets/imagens/simulador/cisterna.png" class="objeto cisterna">

    <img src="/assets/imagens/simulador/mercado.png" class="objeto mercado">

    <div class="plantacao">
  <div class="plantacao">
  <img src="/assets/imagens/simulador/terra.png" class="terra">
  <img src="/assets/imagens/simulador/terra.png" class="terra">
  <img src="/assets/imagens/simulador/terra.png" class="terra">
</div>
</div>

</div>
<!-- ARMAZÉM -->
<div id="armazem" class="armazem oculto">

  <div class="armazem-conteudo">

    <div class="lista-itens">

      <div class="item" onclick="mostrarInfo('milho')">
        🌽 Milho - 50 kg
      </div>

      <div class="item" onclick="mostrarInfo('soja')">
        🌱 Soja - 40 kg
      </div>

      <div class="item" onclick="mostrarInfo('feijao')">
        🫘 Feijão - 25 kg
      </div>

      <div class="item" onclick="mostrarInfo('alface')">
        🥬 Alface - 30 un.
      </div>

      <div class="item" onclick="mostrarInfo('organico')">
        🧺 Adubo Orgânico - 20 sacos
      </div>

      <div class="item" onclick="mostrarInfo('quimico')">
        🧪 Adubo Químico - 15 sacos
      </div>

    </div>

    <div id="painel-info" class="painel-info">

      <h2>galpao</h2>

      <p>
        Selecione um item para visualizar informações.
      </p>

    </div>

    <button class="fechar" onclick="fecharArmazem()">
      X
    </button>

  </div>

</div>                 

<script src="simulador.js"></script>

</body>
</html>
