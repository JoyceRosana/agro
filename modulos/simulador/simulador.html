<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Simulador Fazenda</title>

<style>
body{
margin:0;
overflow:hidden;
background:#87CEEB;
}

.hud{
position:absolute;
top:10px;
left:10px;
z-index:10;
background:white;
padding:10px;
border-radius:10px;
}

canvas{
display:block;
}
</style>

</head>

<body>

<div class="hud">
<div id="moedas">Moedas: 250</div>
<div id="nivel">Nível: 3</div>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- GLTFLoader -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<script>

// Cena
const cena = new THREE.Scene();
cena.background = new THREE.Color(0x87CEEB);

// Câmera
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,2,5);

// Renderizador
const renderizador = new THREE.WebGLRenderer({
antialias:true
});

renderizador.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(
renderizador.domElement
);

// Luz
const luz = new THREE.DirectionalLight(
0xffffff,
1
);

luz.position.set(5,10,5);
cena.add(luz);

const luzAmbiente =
new THREE.AmbientLight(
0xffffff,
0.7
);

cena.add(luzAmbiente);

// Carregar modelo 3D
const loader =
new THREE.GLTFLoader();

loader.load(

'./tree(1).glb',

function(gltf){

const arvore = gltf.scene;

arvore.scale.set(
1,
1,
1
);

arvore.position.set(
0,
0,
0
);

cena.add(arvore);

},

undefined,

function(erro){

console.error(
"Erro ao carregar:",
erro
);

}

);

// Animação
function animar(){

requestAnimationFrame(
animar
);

renderizador.render(
cena,
camera
);

}

animar();

// Responsividade
window.addEventListener(
'resize',
()=>{

camera.aspect=
window.innerWidth/
window.innerHeight;

camera.updateProjectionMatrix();

renderizador.setSize(
window.innerWidth,
window.innerHeight
);

}
);

</script>

</body>
</html>
